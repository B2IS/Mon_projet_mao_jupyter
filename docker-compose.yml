version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: enertic-db
    environment:
      POSTGRES_DB: enertic_ai
      POSTGRES_USER: enertic
      POSTGRES_PASSWORD: enertic123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enertic -d enertic_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enertic-backend
    environment:
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
      DATABASE_URL: postgresql://enertic:enertic123@postgres:5432/enertic_ai
      JWT_SECRET: enertic_ai_secret_production_key
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enertic-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: enertic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
