# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose — SIGEPP-DPE (Frontend Next.js + Backend FastAPI + PostgreSQL)
# Architecture complète pour déploiement local ou cloud
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Base de données PostgreSQL (fallback local si Supabase Cloud non utilisé) ──
  postgres:
    image: postgres:16-alpine
    container_name: sigepp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sigepp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sigepp2026}
      POSTGRES_DB: ${POSTGRES_DB:-sigepp_dpe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sigepp} -d ${POSTGRES_DB:-sigepp_dpe}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI (Python) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigepp-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-sigepp}:${POSTGRES_PASSWORD:-sigepp2026}@postgres:5432/${POSTGRES_DB:-sigepp_dpe}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    volumes:
      - ./backend/src:/app/src
      - ./backend/models:/app/models
      - ./backend/reports:/app/reports
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      python -m uvicorn src.api.app:app
      --host 0.0.0.0 --port 8000 --workers 2 --reload

  # ── Frontend Next.js ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sigepp-frontend
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: >
      npm run dev

  # ── Ollama (IA Open Source LLM — optionnel, pour inférence locale) ──
  ollama:
    image: ollama/ollama:latest
    container_name: sigepp-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Décommenter pour GPU NVIDIA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data:
