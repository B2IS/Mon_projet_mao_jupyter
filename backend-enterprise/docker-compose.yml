# SIGEPP-DPE — infra de développement (PostgreSQL + API NestJS).
#   docker compose up -d db        # démarre PostgreSQL
#   npm run prisma:migrate         # crée le schéma
#   npm run prisma:seed            # référentiel org + RH
#   psql "$DATABASE_URL" -f prisma/rls/enable_rls.sql   # active la RLS
#   npm run start:dev              # API → http://localhost:4000/api (+ /graphql)
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sigepp
      POSTGRES_PASSWORD: sigepp
      POSTGRES_DB: sigepp
    ports: ['5432:5432']
    volumes: ['sigepp_pg:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sigepp']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://sigepp:sigepp@db:5432/sigepp?schema=public
      PORT: '4000'
    ports: ['4000:4000']
    command: sh -c "npx prisma migrate deploy && node dist/src/main.js"

volumes:
  sigepp_pg:
